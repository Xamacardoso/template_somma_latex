name: Build LaTeX Template

on:
  push:
    branches: 
      - main
      - feature/template-standardization # Adicionado para testar agora
  pull_request:
    branches: 
      - main
  workflow_dispatch: # Permite rodar manualmente pela aba "Actions"

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Compilar documento principal (main.tex)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          # Usamos latexmk para que ele gerencie o Biber e as múltiplas passagens
          compiler: latexmk 
          # A flag -xelatex dentro dos args instrui o latexmk a usar o motor correto
          args: -xelatex -pdf -interaction=nonstopmode -file-line-error

      - name: Fazer upload do PDF gerado
        uses: actions/upload-artifact@v4
        with:
          name: Template_Somma_PDF
          path: main.pdf
          retention-days: 7
